version: '3.8'

services:
  # ==========================================
  # BACKEND (Express API + BullMQ Worker)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: judgeweb-backend
    environment:
      # Node environment
      - NODE_ENV=production
      - PORT=${BACKEND_PORT:-5000}
      
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      # Mount problems.json (so you can edit without rebuilding)
      - ./backend/src/data:/app/dist/data:ro
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ==========================================
  # FRONTEND (Nginx serving React)
  # ==========================================
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Use /api so the browser hits same origin; nginx proxies to backend
        - VITE_API_BASE=${VITE_API_BASE:-/api}
    container_name: judgeweb-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

# ==========================================
# NETWORKS
# ==========================================
networks:
  app-network:
    driver: bridge